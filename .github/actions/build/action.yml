name: "Build"
description: Set up Nix environment for GitHub Actions

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
    # TODO: cachix
    - name: Build the devlog
      shell: "bash"
      run: |
        # Run the build as an app, not the sandboxed `nix build .#devlog`, so its
        # link-card fetch (`just build` -> fetch-linkcards) has network and writes
        # the gitignored cache itself. Output lands in ./out. Tools stay nix-pinned.
        nix run .#build
