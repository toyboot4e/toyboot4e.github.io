name: "Main"

# Stop other CI in the same branch on new run:
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Run on source file or build script change only
on:
  push:
    branches: 'main'
    paths:
      - src/**
      # the bun build (uniorg render + bake) shipped by `nix build .#devlog`
      - build.ts
      - build/**
      - scripts/**
      - Justfile
      - flake.nix
      - flake.lock
      - package.json
      - package-lock.json

# Deny all permissions by default; grant per job below
permissions: {}

# Build and deploy
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read    # to check out the repository
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Build devlog
      uses: ./.github/actions/build
    - name: Upload devlog artifact
      uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
      with:
        path: result/out

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

